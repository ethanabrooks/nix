# Prefix: Ctrl-s (one-handed)
unbind C-b
set -g prefix C-s
bind -r C-s send-prefix

# Enable clipboard (needed for copy over SSH)
set -g set-clipboard on

# Vi mode
set-window-option -g mode-keys vi

# No escape delay (makes vi mode responsive)
set -s escape-time 0

# Quick pane cycling (Ctrl-s Ctrl-s)
unbind ^S
bind ^S select-pane -t :.+

# Split panes
bind ] split-window -h
bind - split-window -v

# Window titles
set-option -g set-titles on
set-option -g set-titles-string '#T'

# Bell monitoring (Claude Code rings the bell when it needs input)
set -g monitor-bell on
set -g bell-action any
set -g visual-bell off
set -g window-status-bell-style 'fg=red,bold'

# Status bar: show cc sessions needing attention
set -g status-right '#(~/bin/cc alerts 2>/dev/null) %H:%M '
set -g status-interval 5

# Quick cc session picker (prefix + C-p)
bind C-p display-popup -E "~/bin/cc pick"
