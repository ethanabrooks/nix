# Prefix: Ctrl-s (one-handed)
unbind C-b
set -g prefix C-s
bind -r C-s send-prefix

# Enable clipboard (needed for copy over SSH)
set -g set-clipboard on

# Vi mode
set-window-option -g mode-keys vi

# No escape delay (makes vi mode responsive)
set -s escape-time 0

# Quick pane cycling (Ctrl-s Ctrl-s)
unbind ^S
bind ^S select-pane -t :.+

# Split panes
bind ] split-window -h
bind - split-window -v
